<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Awizacja dostaw</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; max-width: 1000px; margin: auto; }
.slot { border:1px solid #ccc; padding:5px; margin:5px; }
button { padding:5px 10px; margin-top:5px; }
.hidden { display:none; }
.admin { background:#f2f2f2; padding:10px; margin-top:20px; }
</style>
</head>
<body>

<h2>System awizacji dostaw</h2>

<div id="loginBox">
<h3>Logowanie dostawcy</h3>
<input id="supplierName" placeholder="Nazwa firmy">
<input id="supplierPin" placeholder="PIN">
<button onclick="loginSupplier()">Zaloguj</button>

<h3>Administrator</h3>
<input id="adminPass" type="password" placeholder="Hasło admina">
<button onclick="loginAdmin()">Zaloguj jako admin</button>
</div>

<div id="app" class="hidden">
<h3 id="welcome"></h3>
<div id="calendar"></div>
</div>

<div id="adminPanel" class="admin hidden">
<h3>Panel Administratora</h3>
<div id="allBookings"></div>
</div>

<script>

// 🔹 TWOJE DANE SUPABASE
const SUPABASE_URL = 'https://hekspmfqnsophgwpuibv.supabase.co';
const SUPABASE_ANON_KEY = 'PAkG0QlNbZuOFoV5tXyXPg_GDfLPM1o';

// 🔹 HASŁO ADMINA
const ADMIN_PASSWORD = "admin123";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentSupplier = null;
let isAdmin = false;

async function loginSupplier() {
    const name = document.getElementById("supplierName").value;
    const pin = document.getElementById("supplierPin").value;

    const { data, error } = await client
        .from('suppliers')
        .select('*')
        .eq('name', name)
        .eq('pin', pin)
        .single();

    if (error || !data) {
        alert("Błędne dane logowania");
        return;
    }

    currentSupplier = data.name;
    startApp();
}

function loginAdmin() {
    const pass = document.getElementById("adminPass").value;

    if (pass === ADMIN_PASSWORD) {
        isAdmin = true;
        startApp();
    } else {
        alert("Błędne hasło");
    }
}

function startApp() {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("welcome").innerText =
        isAdmin ? "Witaj Admin" : "Zalogowany: " + currentSupplier;

    if (isAdmin) {
        document.getElementById("adminPanel").classList.remove("hidden");
        loadAllBookings();
    }

    generateCalendar();
}

function generateCalendar() {
    const calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    const today = new Date();

    for (let d = 0; d < 14; d++) {
        let date = new Date();
        date.setDate(today.getDate() + d);

        let day = date.getDay();
        if (day === 0 || day === 6) continue;

        for (let h = 6; h < 13; h++) {
            createSlot(date, h);
        }
    }
}

async function createSlot(date, hour) {
    const dateStr = date.toISOString().split('T')[0];

    const { data } = await client
        .from('bookings')
        .select('*')
        .eq('date', dateStr)
        .eq('hour', hour);

    const count = data ? data.length : 0;

    const div = document.createElement("div");
    div.className = "slot";
    div.innerHTML = `${dateStr} ${hour}:00 (${count}/2)`;

    if (count < 2 && !isAdmin) {
        const btn = document.createElement("button");
        btn.innerText = "Rezerwuj";
        btn.onclick = () => bookSlot(dateStr, hour);
        div.appendChild(btn);
    }

    document.getElementById("calendar").appendChild(div);
}

async function bookSlot(date, hour) {
    if (!currentSupplier) return;

    const { error } = await client
        .from('bookings')
        .insert([{ supplier: currentSupplier, date, hour }]);

    if (error) {
        alert("Błąd zapisu");
        return;
    }

    alert("Zarezerwowano");
    generateCalendar();
}

async function loadAllBookings() {
    const { data } = await client.from('bookings').select('*');

    const div = document.getElementById("allBookings");
    div.innerHTML = "";

    data.forEach(b => {
        const el = document.createElement("div");
        el.innerHTML = `${b.date} ${b.hour}:00 - ${b.supplier}`;

        const btn = document.createElement("button");
        btn.innerText = "Usuń";
        btn.onclick = () => deleteBooking(b.id);

        el.appendChild(btn);
        div.appendChild(el);
    });
}

async function deleteBooking(id) {
    await client.from('bookings').delete().eq('id', id);
    loadAllBookings();
    generateCalendar();
}

</script>
</body>
</html>
